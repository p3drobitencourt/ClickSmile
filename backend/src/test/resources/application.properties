spring.datasource.url=jdbc:h2:mem:clicksmile_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.repositories.enabled=false

app.cors.allowed-origins=http://localhost:8081,http://localhost:4200
app.websocket.allowed-origins=http://localhost:8081,http://localhost:4200
app.security.jwt.issuer=clicksmile-test
app.security.jwt.access-token-ttl=15m
app.security.jwt.refresh-token-ttl=30d