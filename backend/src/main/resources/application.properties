spring.application.name=ClickSmile
server.port=${PORT:10000}

# PostgreSQL 16
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:clicksmile}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:clicksmile}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:clicksmile_dev}}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway controla o esquema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis para pub/sub, rate limit e presença (Desativado no Railway temporariamente se não houver Redis)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:${REDISHOST:localhost}}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:${REDISPORT:6379}}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:${REDISPASSWORD:clicksmile_dev}}
spring.data.redis.repositories.enabled=false

# JWT RSA-256
app.security.jwt.issuer=clicksmile
app.security.jwt.access-token-ttl=15m
app.security.jwt.refresh-token-ttl=30d
app.security.jwt.private-key-path=${APP_SECURITY_JWT_PRIVATE_KEY_PATH:classpath:security/jwt/private.pem}
app.security.jwt.public-key-path=${APP_SECURITY_JWT_PUBLIC_KEY_PATH:classpath:security/jwt/public.pem}

# CORS restrito ao frontend web
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:4200}

# WebSocket
app.websocket.endpoint=/ws
app.websocket.allowed-origins=${APP_WEBSOCKET_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:4200}