name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Build backend
        working-directory: backend
        run: |
          ./gradlew clean build
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build --if-present