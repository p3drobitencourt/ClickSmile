<div class="dashboard-container">
  <header class="hero-panel">
    <div>
      <p class="eyebrow">Painel do Especialista</p>
      <h1>Visão Geral do Consultório</h1>
    </div>
  </header>

  <!-- Metrics -->
  <app-dentista-metrics 
    [consultasHoje]="5" 
    [taxaAceitacao]="92" 
    [ganhosProjetados]="'1.250,00'">
  </app-dentista-metrics>

  <div class="responsive-grid">
    <!-- Agenda -->
    <div class="agenda-wrapper" style="grid-column: span 2;">
      <app-dentista-agenda 
        *ngIf="!loading"
        [loading]="loading" 
        [saving]="saving" 
        [dentistaId]="dentistaId" 
        [payload]="payload"
        (onSave)="saveAgenda($event)">
      </app-dentista-agenda>
    </div>

    <!-- Chat Requests -->
    <div class="chat-wrapper">
      <app-dentista-chat-requests 
        [requests]="mockRequests" 
        (onAccept)="acceptChat($event)">
      </app-dentista-chat-requests>
    </div>

    <!-- Calendar View -->
    <div class="calendar-wrapper" style="grid-column: span 3; background: var(--surface-bg, #0f172a); border-radius: 12px; border: 1px solid var(--border-color, #1e293b); padding: 24px; margin-top: 24px;">
      <h3 style="margin-top: 0; margin-bottom: 24px; font-size: 1.1rem; color: #f8fafc; font-weight: 500;">Agenda Semanal</h3>
      <full-calendar [options]="calendarOptions"></full-calendar>
    </div>
  </div>
</div>
