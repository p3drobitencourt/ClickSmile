<div class="settings-grid">
  <article class="surface-panel config-panel">
    <h3>Preferências Globais</h3>
    
    <div class="input-group">
      <label>Fuso Horário</label>
      <div class="select-wrapper">
        <select [(ngModel)]="payload.timezone">
          <option value="America/Sao_Paulo">America/Sao_Paulo (BRT)</option>
          <option value="America/Manaus">America/Manaus (AMT)</option>
          <option value="America/Fortaleza">America/Fortaleza (BRT)</option>
        </select>
      </div>
    </div>

    <div class="input-group">
      <label>Duração da Consulta (minutos)</label>
      <input type="number" [(ngModel)]="payload.slotDurationMin" step="15" min="15" max="120" />
    </div>
  </article>

  <article class="surface-panel schedule-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
      <h3 style="margin: 0;">Dias de Atendimento</h3>
      <button class="btn-primary" (click)="save()" [disabled]="saving">
        <span *ngIf="saving" class="spinner"></span>
        {{ saving ? 'Salvando...' : 'Salvar Agenda' }}
      </button>
    </div>
    
    <div class="week-list">
      <div *ngFor="let d of weekdays" class="day-row" [class.active]="isDayActive(d)">
        <div class="day-toggle">
          <label class="switch">
            <input type="checkbox" [checked]="isDayActive(d)" (change)="toggleDay(d)" />
            <span class="slider round"></span>
          </label>
          <span class="day-name">{{ translateDay(d) }}</span>
        </div>
        
        <div class="time-range" *ngIf="isDayActive(d)">
          <input type="time" [value]="getRule(d)?.inicio" (change)="updateTime(d, 'inicio', $event)" />
          <span>até</span>
          <input type="time" [value]="getRule(d)?.fim" (change)="updateTime(d, 'fim', $event)" />
        </div>
        <div class="time-range closed" *ngIf="!isDayActive(d)">
          <span>Fechado</span>
        </div>
      </div>
    </div>
  </article>
</div>
