<div class="corporate-shell">
  <aside class="sidebar">
    <div class="brand">
      <h2>ClickSmile</h2>
      <p class="role-badge">{{ isDentista ? 'Dentista' : 'Cliente' }}</p>
    </div>
    
    <nav class="nav-links">
      <ng-container *ngIf="isAdmin">
        <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Gestão Global</a>
      </ng-container>

      <ng-container *ngIf="isDentista && !isAdmin">
        <a routerLink="/dentista/agenda" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Agenda Semanal</a>
        <a routerLink="/dentista/pacientes" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Meus Pacientes</a>
        <a routerLink="/dentista/configuracoes" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Configurações</a>
      </ng-container>

      <ng-container *ngIf="!isDentista && !isAdmin">
        <a href="#" [class.active]="activeTab === 'BUSCAR'" (click)="setTab('BUSCAR', $event)">
          Buscar Dentistas
        </a>
        <a href="#" [class.active]="activeTab === 'CHAT_AGENDA'" (click)="setTab('CHAT_AGENDA', $event)">
          Minhas Consultas
        </a>
        <a href="#" [class.active]="activeTab === 'PERFIL'" (click)="setTab('PERFIL', $event)">
          Meu Perfil
        </a>
      </ng-container>
    </nav>
    
    <div class="user-profile">
      <div class="avatar">{{ userEmail.charAt(0).toUpperCase() }}</div>
      <div class="info">
        <strong>Meu Perfil</strong>
        <small>{{ userEmail }}</small>
        <a href="#" (click)="logout($event)" class="logout-link">Sair</a>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
