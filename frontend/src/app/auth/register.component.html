<section class="auth-shell auth-shell--simple">
  <div class="auth-panel auth-panel--form">
    <div class="auth-topbar">
      <app-logo [size]="40"></app-logo>
      <a routerLink="/login">Já tenho conta</a>
    </div>

    <div class="auth-card-head">
      <p class="kicker">Novo cadastro</p>
      <h2>Criar acesso</h2>
      <p>Crie um usuário, vincule a clínica e entre no onboarding com a sessão pronta.</p>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Perfil</span>
        <select formControlName="perfil">
          <option value="CLIENTE">Cliente</option>
          <option value="DENTISTA">Dentista</option>
        </select>
      </label>

      <label>
        <span>Nome completo</span>
        <input type="text" formControlName="nome" placeholder="Seu nome" />
      </label>

      <label>
        <span>Email</span>
        <input type="email" formControlName="email" placeholder="voce@clinica.com" />
      </label>

      <label>
        <span>Senha</span>
        <input type="password" formControlName="senha" placeholder="Crie uma senha forte (mínimo 8 caracteres)" />
      </label>

      @if (perfil === 'CLIENTE') {
        <label>
          <span>Telefone</span>
          <input type="text" formControlName="telefone" placeholder="(11) 99999-9999" />
        </label>
      } @else {
        <label>
          <span>Nome da clínica</span>
          <input type="text" formControlName="nomeClinica" placeholder="Clínica Sorria Bem" />
        </label>
        <div class="grid-two">
          <label>
            <span>CRO</span>
            <input type="text" formControlName="cro" placeholder="CRO-12345" />
          </label>
          <label>
            <span>Especialidade</span>
            <input type="text" formControlName="especialidade" placeholder="Ortodontia" />
          </label>
        </div>
      }

      <p *ngIf="erro" class="error-box">{{ erro }}</p>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Criando acesso...' : 'Cadastrar e entrar' }}
      </button>
    </form>
  </div>
</section>
